services:
  desafio-tecnico-db-dev:
    image: postgres:15-alpine
    container_name: desafio-tecnico-db-dev
    environment:
      POSTGRES_DB: DesafioTecnicoDb_Dev
      POSTGRES_USER: desafiotecnico
      POSTGRES_PASSWORD: desafiotecnico123
    ports:
      - "5432:5432"
    volumes:
      - desafio-tecnico-db-dev-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - desafio-tecnico-dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U desafiotecnico -d DesafioTecnicoDb_Dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  desafio-tecnico-api:
    build:
      context: .
      dockerfile: src/DesafioTecnico.API/Dockerfile
    container_name: desafio-tecnico-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=desafio-tecnico-db-dev;Port=5432;Database=DesafioTecnicoDb_Dev;Username=desafiotecnico;Password=desafiotecnico123
    ports:
      - "5228:5000"
    networks:
      - desafio-tecnico-dev-network
    restart: unless-stopped
    depends_on:
      desafio-tecnico-db-dev:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: desafio-tecnico-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@desafiotecnico.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "8080:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - desafio-tecnico-dev-network
    restart: unless-stopped
    depends_on:
      - desafio-tecnico-db-dev

volumes:
  desafio-tecnico-db-dev-data:
    driver: local
  pgadmin-data:
    driver: local

networks:
  desafio-tecnico-dev-network:
    driver: bridge

